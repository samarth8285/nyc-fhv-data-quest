name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  sonarqube:
    name: SonarQube
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  check_changes:
    name: Check Changed Files
    runs-on: ubuntu-latest
    outputs:
      development_changed: ${{ steps.filter.outputs.development }}
    steps:
      - uses: actions/checkout@v4
      - name: Check if development folder changed
        uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            development:
              - 'development/**'

  deploy:
    name: AWS Infrastructure Deployment
    runs-on: ubuntu-latest
    needs: [sonarqube, check_changes]
    if: needs.check_changes.outputs.development_changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: pip install -r lambda/lambda_ingestion/requirements.txt

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Run Deployment Script
        run: py -B -m development.deploy
